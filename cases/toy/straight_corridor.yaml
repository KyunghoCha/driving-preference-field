metadata:
  name: straight_corridor
  description: Straight drivable corridor with a forward progression guide.
query_window:
  x_min: -1.0
  x_max: 7.0
  y_min: -2.0
  y_max: 2.0
ego_pose:
  x: 0.5
  y: 0.0
  yaw: 0.0
drivable_regions:
  - id: main_corridor
    points:
      - [0.0, -1.0]
      - [6.0, -1.0]
      - [6.0, 1.0]
      - [0.0, 1.0]
progression_guides:
  - id: center_guide
    points:
      - [0.0, 0.0]
      - [6.0, 0.0]
boundaries:
  - id: lower_boundary
    points:
      - [0.0, -1.0]
      - [6.0, -1.0]
  - id: upper_boundary
    points:
      - [0.0, 1.0]
      - [6.0, 1.0]
safety_regions:
  - id: off_corridor_obstacle
    points:
      - [4.0, 1.8]
      - [4.4, 1.8]
      - [4.4, 2.2]
      - [4.0, 2.2]
    severity: 1.0
    hard: true
    influence_radius: 0.75

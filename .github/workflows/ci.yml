name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            experimental: false
            qt_platform: offscreen
          - os: macos-latest
            experimental: true
            qt_platform: offscreen
          - os: windows-latest
            experimental: true
            qt_platform: minimal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: local-reference-path-cost
          environment-file: environment.yml
          auto-activate: true
          channels: conda-forge
          conda-remove-defaults: true

      - name: Show Python version
        shell: bash -el {0}
        run: python -V

      - name: Environment smoke imports
        shell: bash -el {0}
        env:
          PYTHONPATH: src
          QT_QPA_PLATFORM: ${{ matrix.qt_platform }}
          MPLBACKEND: Agg
        run: |
          python - <<'PY'
          import matplotlib
          import numpy
          from PyQt6.QtWidgets import QApplication
          import local_reference_path_cost

          print("numpy", numpy.__version__)
          print("matplotlib", matplotlib.__version__)
          print("package", getattr(local_reference_path_cost, "__version__", "import-ok"))
          PY

      - name: Run pytest
        shell: bash -el {0}
        env:
          PYTHONPATH: src
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          QT_QPA_PLATFORM: ${{ matrix.qt_platform }}
          MPLBACKEND: Agg
        run: python -m pytest -q -p pytestqt.plugin

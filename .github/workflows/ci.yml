name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            experimental: false
          - os: windows-latest
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: driving-preference-field
          environment-file: environment.yml
          auto-activate-base: false
          channels: conda-forge

      - name: Show Python version
        shell: bash -el {0}
        run: python -V

      - name: Run pytest
        shell: bash -el {0}
        env:
          PYTHONPATH: src
          QT_QPA_PLATFORM: offscreen
          MPLBACKEND: Agg
        run: pytest -q
